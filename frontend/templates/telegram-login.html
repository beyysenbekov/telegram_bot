<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход через Telegram - TaskManager</title>
    <!-- Telegram WebApp SDK — ОБЯЗАТЕЛЬНО первым! -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow">
                    <div class="card-body p-5 text-center">
                        <div class="mb-4">
                            <h2 class="fw-bold">📋 TaskManager</h2>
                            <p class="text-muted">Вход через Telegram</p>
                        </div>

                        <div id="loginStatus">
                            <div class="spinner-border text-primary mb-3" role="status"></div>
                            <p class="text-muted">Загрузка...</p>
                        </div>

                        <div id="alertContainer" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = '/api';

        // Сразу сообщаем Telegram что страница готова — БЕЗ ЭТОГО ЗАКРЫВАЕТСЯ!
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function showAlert(message, type = 'danger') {
            document.getElementById('alertContainer').innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }

        function showLoading() {
            document.getElementById('loginStatus').innerHTML = `
                <div class="spinner-border text-primary mb-3" role="status"></div>
                <p class="text-muted">Выполняется вход...</p>
            `;
        }

        function showSuccess() {
            document.getElementById('loginStatus').innerHTML = `
                <div class="text-success mb-3" style="font-size: 4rem;">✅</div>
                <h5>Вход выполнен!</h5>
                <p class="text-muted">Перенаправление в дашборд...</p>
            `;
        }

        function showWidget() {
            document.getElementById('loginStatus').innerHTML = `
                <h5 class="mb-3">Войти через Telegram</h5>
                <p class="text-muted mb-4">Нажмите кнопку ниже</p>
                <div id="tg-widget-container"></div>
                <div class="mt-4">
                    <a href="/login" class="text-muted small">← Вход по email</a>
                </div>
            `;

            const BOT_USERNAME = 'testbotaikz_bot'; // БЕЗ @
            const authUrl = window.location.origin + '/telegram-login';

            const script = document.createElement('script');
            script.async = true;
            script.src = 'https://telegram.org/js/telegram-widget.js?22';
            script.setAttribute('data-telegram-login', BOT_USERNAME);
            script.setAttribute('data-size', 'large');
            script.setAttribute('data-radius', '10');
            script.setAttribute('data-auth-url', authUrl);
            script.setAttribute('data-request-access', 'write');

            document.getElementById('tg-widget-container').appendChild(script);
        }

        async function loginWithData(telegram_id, first_name, username, hash, auth_date) {
            showLoading();
            try {
                const response = await fetch(`${API_URL}/auth/telegram-login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        telegram_id: parseInt(telegram_id),
                        first_name: first_name || 'Пользователь',
                        username: username || null,
                        hash: hash || null,
                        auth_date: auth_date || null
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.access_token);
                    showSuccess();
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1000);
                } else {
                    showWidget();
                    showAlert(data.detail || 'Ошибка входа');
                }
            } catch (error) {
                console.error(error);
                showWidget();
                showAlert('Ошибка подключения к серверу');
            }
        }

        // ГЛАВНАЯ ЛОГИКА — 3 сценария:

        const urlParams = new URLSearchParams(window.location.search);

        if (urlParams.get('id') && urlParams.get('hash')) {
            // Сценарий 1: пришли с параметрами от Telegram Widget (браузер)
            loginWithData(
                urlParams.get('id'),
                urlParams.get('first_name'),
                urlParams.get('username'),
                urlParams.get('hash'),
                urlParams.get('auth_date')
            );

        } else if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            // Сценарий 2: открыто внутри Telegram (WebApp) — берём данные из SDK
            const user = tg.initDataUnsafe.user;
            loginWithData(
                user.id,
                user.first_name,
                user.username,
                null,
                null
            );

        } else {
            // Сценарий 3: обычный браузер без параметров — показываем виджет
            showWidget();
        }
    </script>
</body>
</html>
