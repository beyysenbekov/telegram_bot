<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои задачи - TaskManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard">📋 TaskManager</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard">Дашборд</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/tasks">Задачи</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <span class="navbar-text me-3" id="userName">Загрузка...</span>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-outline-light btn-sm" onclick="logout()">Выйти</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Мои задачи</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createTaskModal">
                ➕ Создать задачу
            </button>
        </div>

        <!-- Фильтры -->
        <div class="card mb-4">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Статус</label>
                        <select class="form-select" id="filterStatus" onchange="loadTasks()">
                            <option value="">Все</option>
                            <option value="в процессе">В процессе</option>
                            <option value="выполнено">Выполнено</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Приоритет</label>
                        <select class="form-select" id="filterPriority" onchange="applyFilters()">
                            <option value="">Все</option>
                            <option value="высокий">Высокий</option>
                            <option value="средний">Средний</option>
                            <option value="низкий">Низкий</option>
                        </select>
                    </div>
                    <div class="col-md-4 d-flex align-items-end">
                        <button class="btn btn-secondary w-100" onclick="resetFilters()">Сбросить</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Список задач -->
        <div id="tasksList">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
            </div>
        </div>
    </div>

    <!-- Модальное окно создания задачи -->
    <div class="modal fade" id="createTaskModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Создать задачу</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Название *</label>
                        <input type="text" class="form-control" id="taskTitle" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Описание</label>
                        <textarea class="form-control" id="taskDescription" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Приоритет</label>
                        <select class="form-select" id="taskPriority">
                            <option value="низкий">🟢 Низкий</option>
                            <option value="средний" selected>🟡 Средний</option>
                            <option value="высокий">🔴 Высокий</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Дедлайн</label>
                        <input type="datetime-local" class="form-control" id="taskDeadline">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" class="btn btn-primary" onclick="createTask()">Создать</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = '/api';
        const token = localStorage.getItem('token');

        if (!token) window.location.href = '/login';

        const headers = {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
        };

        let allTasks = [];

        async function loadUser() {
            try {
                const response = await fetch(`${API_URL}/auth/me`, { headers });
                const user = await response.json();
                if (response.ok) {
                    document.getElementById('userName').textContent = user.first_name;
                }
            } catch (error) {
                console.error(error);
            }
        }

        async function loadTasks() {
            const status = document.getElementById('filterStatus').value;
            const url = status ? `${API_URL}/tasks?status=${encodeURIComponent(status)}` : `${API_URL}/tasks`;

            try {
                const response = await fetch(url, { headers });
                allTasks = await response.json();
                if (response.ok) {
                    applyFilters();
                }
            } catch (error) {
                console.error('Ошибка загрузки задач:', error);
            }
        }

        function applyFilters() {
            const priority = document.getElementById('filterPriority').value;
            let filtered = allTasks;
            if (priority) {
                filtered = filtered.filter(t => t.priority === priority);
            }
            renderTasks(filtered);
        }

        function resetFilters() {
            document.getElementById('filterStatus').value = '';
            document.getElementById('filterPriority').value = '';
            loadTasks();
        }

        function renderTasks(tasks) {
            const container = document.getElementById('tasksList');

            if (tasks.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-5 text-muted">
                        <h4>Задач не найдено</h4>
                        <p>Создайте свою первую задачу!</p>
                    </div>
                `;
                return;
            }

            const priorityEmoji = { 'высокий': '🔴', 'средний': '🟡', 'низкий': '🟢' };
            const statusBadge = { 'в процессе': 'warning', 'выполнено': 'success', 'отменено': 'danger' };

            container.innerHTML = tasks.map(task => `
                <div class="card mb-3 task-card">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="flex-grow-1">
                                <h5 class="card-title">
                                    ${priorityEmoji[task.priority] || ''} ${task.title}
                                    <span class="badge bg-${statusBadge[task.status] || 'secondary'}">${task.status}</span>
                                </h5>
                                ${task.description ? `<p class="text-muted mb-1">${task.description}</p>` : ''}
                                ${task.deadline ? `<small class="text-danger">⏰ Дедлайн: ${new Date(task.deadline).toLocaleDateString('ru-RU')}</small>` : ''}
                                <div class="mt-1">
                                    <small class="text-muted">Создана: ${new Date(task.created_at).toLocaleDateString('ru-RU')}</small>
                                </div>
                            </div>
                            <div class="task-actions ms-3">
                                ${task.status === 'в процессе' ? `
                                    <button class="btn btn-sm btn-success me-1" onclick="completeTask(${task.id})">
                                        ✓ Выполнено
                                    </button>
                                ` : ''}
                                <button class="btn btn-sm btn-danger" onclick="deleteTask(${task.id})">
                                    🗑️
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function createTask() {
            const title = document.getElementById('taskTitle').value.trim();
            if (!title) {
                alert('Введите название задачи');
                return;
            }

            const task = {
                title: title,
                description: document.getElementById('taskDescription').value || null,
                priority: document.getElementById('taskPriority').value,
                deadline: document.getElementById('taskDeadline').value || null
            };

            try {
                const response = await fetch(`${API_URL}/tasks`, {
                    method: 'POST',
                    headers,
                    body: JSON.stringify(task)
                });

                if (response.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('createTaskModal')).hide();
                    document.getElementById('taskTitle').value = '';
                    document.getElementById('taskDescription').value = '';
                    document.getElementById('taskDeadline').value = '';
                    loadTasks();
                }
            } catch (error) {
                console.error('Ошибка создания задачи:', error);
            }
        }

        async function completeTask(id) {
            try {
                const response = await fetch(`${API_URL}/tasks/${id}/complete`, {
                    method: 'PATCH',
                    headers
                });
                if (response.ok) loadTasks();
            } catch (error) {
                console.error(error);
            }
        }

        async function deleteTask(id) {
            if (!confirm('Удалить задачу?')) return;
            try {
                const response = await fetch(`${API_URL}/tasks/${id}`, {
                    method: 'DELETE',
                    headers
                });
                if (response.ok) loadTasks();
            } catch (error) {
                console.error(error);
            }
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/login';
        }

        loadUser();
        loadTasks();
    </script>
</body>
</html>
