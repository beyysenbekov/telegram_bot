<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дашборд - TaskManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard">📋 TaskManager</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/dashboard">Дашборд</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/tasks">Задачи</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <span class="navbar-text me-3" id="userName">Загрузка...</span>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-outline-light btn-sm" onclick="logout()">Выйти</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Карточки статистики -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card text-center stat-card">
                    <div class="card-body">
                        <h5 class="text-muted">Всего задач</h5>
                        <h2 class="mb-0" id="totalTasks">-</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center stat-card">
                    <div class="card-body">
                        <h5 class="text-muted">Выполнено</h5>
                        <h2 class="mb-0 text-success" id="completedTasks">-</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center stat-card">
                    <div class="card-body">
                        <h5 class="text-muted">В процессе</h5>
                        <h2 class="mb-0 text-warning" id="pendingTasks">-</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center stat-card">
                    <div class="card-body">
                        <h5 class="text-muted">Процент выполнения</h5>
                        <h2 class="mb-0 text-info" id="completionRate">-</h2>
                    </div>
                </div>
            </div>
        </div>

        <!-- Графики -->
        <div class="row mb-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">📊 Статус задач</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="statusChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">📈 Продуктивность за неделю</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="weekChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Быстрые действия -->
        <div class="row mb-4">
            <div class="col-md-6 offset-md-3">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">⚡ Быстрые действия</h5>
                    </div>
                    <div class="card-body">
                        <div class="d-grid gap-2">
                            <a href="/tasks" class="btn btn-primary">➕ Создать новую задачу</a>
                            <button class="btn btn-outline-primary" onclick="refreshStats()">🔄 Обновить статистику</button>
                            <a href="/tasks" class="btn btn-outline-warning">⏳ Активные задачи</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = '/api';
        let charts = {};

        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login';

        const headers = {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
        };

        async function loadUserInfo() {
            try {
                const response = await fetch(`${API_URL}/auth/me`, { headers });
                const user = await response.json();
                if (response.ok) {
                    document.getElementById('userName').textContent = user.first_name;
                } else {
                    logout();
                }
            } catch (error) {
                console.error(error);
            }
        }

        async function loadStatistics() {
            try {
                const response = await fetch(`${API_URL}/statistics`, { headers });
                const stats = await response.json();

                if (response.ok) {
                    document.getElementById('totalTasks').textContent = stats.total;
                    document.getElementById('completedTasks').textContent = stats.completed;
                    document.getElementById('pendingTasks').textContent = stats.pending;
                    document.getElementById('completionRate').textContent = stats.completion_rate + '%';
                    createCharts(stats);
                }
            } catch (error) {
                console.error('Ошибка загрузки статистики:', error);
            }
        }

        function createCharts(stats) {
            // График статусов
            const statusCtx = document.getElementById('statusChart').getContext('2d');
            if (charts.statusChart) charts.statusChart.destroy();
            charts.statusChart = new Chart(statusCtx, {
                type: 'doughnut',
                data: {
                    labels: ['Выполнено', 'В процессе'],
                    datasets: [{
                        data: [stats.completed, stats.pending],
                        backgroundColor: ['#198754', '#ffc107'],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { position: 'bottom' } }
                }
            });

            // График продуктивности за неделю
            const weekCtx = document.getElementById('weekChart').getContext('2d');
            if (charts.weekChart) charts.weekChart.destroy();

            const dates = Object.keys(stats.tasks_per_day);
            const counts = Object.values(stats.tasks_per_day);

            charts.weekChart = new Chart(weekCtx, {
                type: 'bar',
                data: {
                    labels: dates,
                    datasets: [{
                        label: 'Выполнено задач',
                        data: counts,
                        backgroundColor: 'rgba(13, 110, 253, 0.7)',
                        borderColor: '#0d6efd',
                        borderWidth: 1,
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { stepSize: 1 }
                        }
                    }
                }
            });
        }

        function refreshStats() {
            loadStatistics();
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/login';
        }

        loadUserInfo();
        loadStatistics();
    </script>
</body>
</html>
